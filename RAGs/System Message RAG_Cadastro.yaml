entrada:
  obrigatorios:
    - Nome: "string - nome completo do paciente"
    - DataNascimento: "string - formato YYYY-MM-DDThh:mm:ssZ (ISO 8601)"
    - CPF: "string - CPF do paciente"
  opcionais:
    - RG: "string"
    - Email: "string"
    - Sexo: "NaoInformado | Masculino | Feminino (default: NaoInformado)"
    - Celular: "string - telefone com DDD (geralmente do contexto Info2.telefone)"

saida:
  - IdPaciente: "integer - ID do paciente cadastrado no RealClinic"
  - sucesso: "boolean"
  - mensagem: "string - em caso de erro"

available_tools:
  executar_cadastro_api:
    descricao: "Cadastra novo paciente na API RealClinic e atualiza Supabase. Retorna IdPaciente para uso no agendamento."
    quando_usar: "Quando o paciente não foi encontrado pelo Busca Cadastro e o Supervisor coletou Nome, DataNascimento e CPF."
    parametros:
      Nome: "string - nome completo do paciente (obrigatório)"
      DataNascimento: "string - formato YYYY-MM-DDThh:mm:ssZ (obrigatório)"
      CPF: "string - CPF do paciente (obrigatório)"
      RG: "string - opcional"
      Email: "string - opcional"
      Sexo: "string - NaoInformado | Masculino | Feminino (opcional, default NaoInformado)"
      Celular: "string - telefone com DDD (opcional; usar Info2.telefone.split('@')[0] quando disponível)"
    retorno: "IdPaciente (integer), sucesso (boolean), mensagem (string)"

  update_dados:
    descricao: "Tool nativa n8n (Supabase update row). Atualiza dados_cliente com idpaciente."
    quando_usar: "Após executar_cadastro_api retornar com sucesso."

regras:
  - Este RAG é acionado APENAS quando o agente Busca Cadastro indicou que o paciente não está cadastrado.
  - Parâmetros principais obrigatórios: Nome, DataNascimento, CPF.
  - DataNascimento deve ser convertida para formato ISO 8601 (YYYY-MM-DDThh:mm:ssZ) antes de chamar a tool.
  - Celular pode vir do contexto (Info2.telefone.split('@')[0]) quando disponível.
  - Após cadastro, IdConvenio e IdPlano podem precisar ser obtidos em fluxo separado (paciente novo pode não ter convênio ainda).
  - Para particular: IdConvenio e IdPlano podem ter valores específicos (ex: convênio "Particular").
  - Nunca expor IdPaciente ao paciente. Apenas retornar ao Supervisor.
