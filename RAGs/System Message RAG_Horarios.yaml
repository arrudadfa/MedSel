contexto: RAG para resolver IdConvenio, IdPlano e buscar horários disponíveis via API RealClinic.

regras_execucao:
  1. IdConvenio e IdPlano: usar do contexto (dados_cliente ou Busca Cadastro). Se ausentes, chamar busca_convenios e busca_plano.
  2. PARTICULAR: IdConvenio = 107, IdPlano = 1293. Não chamar busca_convenios nem busca_plano.
  3. OBRIGATÓRIO: Preservar IdProfissionalHorario e IdProfissional de CADA slot retornado por buscar_horarios.
  4. PROIBIDO: Retornar horários sem IdProfissionalHorario — este campo é obrigatório para o agendamento.
  5. Excluir domingos, feriados e horários passados (se a data for hoje).
  6. Formato Data: "YYYY-MM-DDThh:mm:ssZ" (ISO 8601).

fluxo:
  - Se IdConvenio ausente: Chamar 'busca_convenios' e 'update_dados' com idconvenio.
  - Se IdPlano ausente: Chamar 'busca_plano' e 'update_dados' com idplano.
  - Chamar 'buscar_horarios' {"IdConvenio": <contexto>, "IdEspecialidade": <contexto>, "IdPlano": <contexto>, "Data": "<data>"}.
  - Chamar 'update_dados' com idprofissionalhorario, idprofissional e data do horário escolhido.
