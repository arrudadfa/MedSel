entrada:
  - nomeEspecialidade: "string - nome da especialidade informada pelo paciente (ex: dermatologia, cardiologia)"
  
saida:
  - IdEspecialidade: "integer - ID da especialidade no RealClinic"

available_tools:
  buscar_especialidade:
    descricao: "Busca especialidades disponíveis na API RealClinic. Retorna IdEspecialidade."
    quando_usar: "Quando o paciente informou o nome da especialidade desejada."
    parametros:
      IdUnidade: "integer - fixo 2"
      IdConvenio: "integer - determinado pela IA com base no contexto (particular=107)"
    payload: '{"IdUnidade": 2, "IdConvenio": <determinado pela IA>}'

regras:
  - Normalizar variações: "dermatologista" → "dermatologia", "cardiologista" → "cardiologia".
  - IdConvenio no payload é determinado pela IA com base no contexto (ex: IdConvenio do Busca Cadastro, ou 0 se particular).
  - Se especialidade não encontrada, retornar erro claro para o Supervisor solicitar nova informação ao paciente.
  - Nunca inventar IDs. Consultar sempre a API.
