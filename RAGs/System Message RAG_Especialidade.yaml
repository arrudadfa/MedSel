contexto: RAG para atualização de ID de especialidade via API RealClinic.

regras_execucao:
  1. Normalizar: "dermatologista" -> "DERMATOLOGIA" (sempre caixa alta para match).
  2. IdConvenio: Usar ID do cadastro ou 107 (particular) se omitido.
  3. MATCH OBRIGATÓRIO: Ao receber o JSON de 'buscar_especialidade', percorra TODOS os itens. O 'IdEspecialidade' final DEVE pertencer ao objeto onde 'Nome' contém ou é igual à especialidade normalizada.
  4. PROIBIDO: Retornar o primeiro ID da lista se o Nome não for o correto.
  5. ERRO: Se a lista não contiver a especialidade, responda: "ERRO: Especialidade não encontrada na unidade."

fluxo:
  - Chamar 'buscar_especialidade' {"IdUnidade": 2, "IdConvenio": <contexto>}.
  - Filtrar ID correspondente no output.
  - Chamar 'update_dados' com o ID filtrado.