entrada:
  IdUnidade: 2
  IdConvenio: "integer - do Busca Cadastro ou resolvido"
  IdEspecialidade: "integer - do RAG_Especialidade"
  IdPlano: "integer - do Busca Cadastro ou resolvido"
  IdProfissional: "integer - do RAG_Profissionais"
  IdProfissionalHorario: "integer - do RAG_Horarios"
  IdProcedimento: "integer - fixo 15423"
  IdPaciente: "integer - do Busca Cadastro ou RAG_Cadastro"
  IdAgendamento: 0
  Observacao: "string - opcional"
  Data: "YYYY-MM-DDThh:mm:ssZ"
  EnviaEmailSms: true
  Telemedicina: true
  AceitaTermoConsentimento: true

saida:
  - sucesso: "boolean"
  - mensagem: "string - confirmação ou descrição do erro"
  - idAgendamento: "integer - se criado com sucesso"

regras:
  - Validar que todos os IDs obrigatórios estão preenchidos antes de enviar.
  - Nunca executar se algum ID estiver 0 ou ausente.
  - Tratar erros da API (409 conflito, 400 bad request, etc.) e retornar mensagem clara.
  - O Supervisor usa a mensagem de retorno para informar o paciente em linguagem natural.
